# Heap sized for a ~7GB-RAM machine. The previous -Xmx8G exceeded total system
# RAM and crashed the Gradle daemon with a native OOM ("failed to map ... bytes").
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=false
kotlin.compiler.execution.strategy=in-process


# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
